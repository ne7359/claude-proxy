version: '3.8'

services:
  claude-proxy-unified:
    build:
      context: .
      dockerfile: Dockerfile-unified
    container_name: claude-proxy-unified
    ports:
      - "8788:8788"
    environment:
      - NODE_ENV=production
      - PORT=8788
      - CONFIG_STORAGE_DIR=/app/.env/config-storage
    volumes:
      # 持久化存储配置数据
      - ./data/proxy.env:/app/proxy/.env
      - ./data/config-storage:/app/.env/config-storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8788/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s