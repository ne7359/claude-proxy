version: '3.8'

services:
  claude-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-proxy-unified
    ports:
      - "8788:8788"
    environment:
      - NODE_ENV=production
      - PORT=8788
      - ENV_FILE_PATH=/app/.env/.env
      - CONFIG_STORAGE_DIR=/app/.env/config-storage
      # 设置初始配置（可选，可在UI中修改）
      - UPSTREAM_BASE_URL=https://api.anthropic.com
      - UPSTREAM_API_KEY=${ANTHROPIC_API_KEY:-your-api-key-here}
      - MAX_SESSIONS=200
    volumes:
      # 持久化存储配置数据
      - ./data/.env:/app/.env/.env
      - ./data/config-storage:/app/.env/config-storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8788/api/config"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s