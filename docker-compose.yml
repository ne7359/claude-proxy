# =============================================================================
# Docker Compose for claude-raw-proxy with Vue UI
# =============================================================================

version: '3.8'

services:
  claude-raw-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/ne7359/claude-proxy:cacdaf9
    container_name: claude-proxy
    ports:
      - "8788:8788"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/app/logs:rw
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8788/debug"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s # 增加启动宽限期，防止启动慢导致健康检查失败

    # 新增日志轮转配置，防止日志文件过大
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-network:
    driver: bridge
