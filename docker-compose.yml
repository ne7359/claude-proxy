services:
  claude-proxy:
    build: .
    container_name: claude
    restart: unless-stopped
    ports:
      - "8788:8788"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/app/logs:rw
      - ./.env:/app/.env:rw
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8788/debug"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  proxy-network:
    driver: bridge
