name: Build and Push Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须保留，否则默认 Token 无法写入 Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 注意：这里直接删除了 "Log in to GitHub Container Registry" 步骤

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/baskduan/claude-proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
