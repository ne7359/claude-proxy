name: Build Docker Image

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 必须先检出代码！
      - name: Checkout code
        uses: actions/checkout@v4
        # 关键配置：如果仓库里有 .dockerignore，必须加这个
        with:
          submodules: false
          fetch-depth: 1

      # 2. 登录 Docker (如果需要)
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. 构建并推送
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: . # 👈 指向项目根目录，这里有 package.json
          file: ./Dockerfile/claude-proxy # 👈 指向你的 Dockerfile
          push: true
          tags: yourname/claude-proxy:latest
